<script type="text/javascript">
  function osUid(prefix) {
    return (
      prefix +
      "-" +
      Date.now().toString(36) +
      "-" +
      Math.random().toString(36).slice(2, 8)
    );
  }

  function selectedConfig(id) {
    var value = $(id).val();
    return value ? RED.nodes.node(value) : null;
  }

  function filterConfigSelect(selectId, predicate) {
    var current = $(selectId).val();
    var currentVisible = false;

    $(selectId)
      .children("option")
      .each(function () {
        var option = $(this);
        var value = option.attr("value");

        if (!value || value === "_ADD_") {
          option.show();
          return;
        }

        var config = RED.nodes.node(value);
        var visible = !config || predicate(config);
        option.toggle(visible);
        if (visible && value === current) currentVisible = true;
      });

    if (current && !currentVisible) {
      $(selectId).val("");
    }
  }

  RED.nodes.registerType("orangescada-driver-config", {
    category: "config",
    defaults: {
      name: { value: "" },
      host: { value: "192.168.0.102", required: true },
      port: { value: 8891, required: true, validate: RED.validators.number() },
      ssl: { value: false },
      uid: { value: "nodered", required: true },
      version: { value: "0.1.0" },
      versionApi: { value: "1.1" },
      reconnectMs: { value: 5000, validate: RED.validators.number() },
    },
    credentials: {
      password: { type: "password" },
    },
    label: function () {
      return this.name || this.uid || "OrangeScada Driver";
    },
  });

  RED.nodes.registerType("orangescada-node-config", {
    category: "config",
    defaults: {
      name: { value: "", required: true },
      uid: { value: "" },
      driver: { type: "orangescada-driver-config", required: true },
    },
    label: function () {
      return this.name || "OrangeScada Node";
    },
    oneditprepare: function () {
      if (!$("#node-config-input-uid").val()) {
        $("#node-config-input-uid").val(osUid("node"));
      }
    },
  });

  RED.nodes.registerType("orangescada-device-config", {
    category: "config",
    defaults: {
      name: { value: "", required: true },
      uid: { value: "" },
      node: { type: "orangescada-node-config", required: true },
    },
    label: function () {
      return this.name || "OrangeScada Device";
    },
    oneditprepare: function () {
      if (!$("#node-config-input-uid").val()) {
        $("#node-config-input-uid").val(osUid("device"));
      }
    },
  });

  RED.nodes.registerType("orangescada-tag", {
    category: "network",
    color: "#d8e8ff",
    defaults: {
      name: { value: "" },
      driver: { type: "orangescada-driver-config", required: true },
      node: { type: "orangescada-node-config", required: true },
      device: { type: "orangescada-device-config", required: true },
      tagUid: { value: "" },
      tagName: { value: "", required: true },
      tagType: { value: "float", required: true },
      address: { value: 0, validate: RED.validators.number() },
    },
    inputs: 1,
    outputs: 1,
    icon: "bridge.svg",
    label: function () {
      return this.name || this.tagName || "OrangeScadaTag";
    },
    oneditprepare: function () {
      function refreshNodes() {
        var driverId = $("#node-input-driver").val();
        filterConfigSelect("#node-input-node", function (config) {
          return config.driver === driverId;
        });
        refreshDevices();
      }

      function refreshDevices() {
        var nodeId = $("#node-input-node").val();
        filterConfigSelect("#node-input-device", function (config) {
          return config.node === nodeId;
        });
      }

      if (!$("#node-input-tagUid").val()) {
        $("#node-input-tagUid").val(osUid("tag"));
      }

      $("#node-input-driver").on("change", refreshNodes);
      $("#node-input-node").on("change", refreshDevices);

      setTimeout(function () {
        refreshNodes();
        refreshDevices();
      }, 0);
    },
  });
</script>
