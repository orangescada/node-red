<script type="text/javascript">
  function osUid(prefix) {
    return (
      prefix +
      "-" +
      Date.now().toString(36) +
      "-" +
      Math.random().toString(36).slice(2, 8)
    );
  }

  function selectedConfig(id) {
    var value = $(id).val();
    return value ? RED.nodes.node(value) : null;
  }

  function filterConfigSelect(selectId, predicate) {
    var current = $(selectId).val();
    var currentVisible = false;

    $(selectId)
      .children("option")
      .each(function () {
        var option = $(this);
        var value = option.attr("value");

        if (!value || value === "_ADD_") {
          option.show();
          return;
        }

        var config = RED.nodes.node(value);
        var visible = !config || predicate(config);
        option.toggle(visible);
        if (visible && value === current) currentVisible = true;
      });

    if (current && !currentVisible) {
      $(selectId).val("");
    }
  }

  function uidExistsInConfigs(type, uid, currentId, sameParent) {
    var exists = false;
    RED.nodes.eachConfig(function (config) {
      if (exists || config.id === currentId || config.type !== type) return;
      if (config.uid !== uid) return;
      exists = !sameParent || sameParent(config);
    });
    return exists;
  }

  function uidExistsInNodes(type, uid, currentId, sameParent) {
    var exists = false;
    RED.nodes.eachNode(function (node) {
      if (exists || node.id === currentId || node.type !== type) return;
      if (node.tagUid !== uid) return;
      exists = !sameParent || sameParent(node);
    });
    return exists;
  }

  function showUidWarning(selector, message) {
    var warning = $(selector);
    if (!warning.length) return;
    warning.text(message || "");
    warning.toggle(Boolean(message));
  }

  function ensureConfigUidForNode(configNode, prefix, type, sameParent) {
    var uid = configNode.uid;
    var originalUid = uid;
    while (
      !uid ||
      uidExistsInConfigs(type, uid, configNode.id, function (node) {
        return !sameParent || sameParent(node, configNode);
      })
    ) {
      uid = osUid(prefix);
    }
    configNode.uid = uid;
    return uid !== originalUid;
  }

  function ensureConfigUid(inputId, prefix, type, currentId, sameParent, warningId) {
    var input = $(inputId);
    var configNode = {
      id: currentId,
      uid: input.val(),
    };
    var changed = ensureConfigUidForNode(configNode, prefix, type, sameParent);
    input.val(configNode.uid);
    showUidWarning(
      warningId,
      changed ? "Duplicate or missing UID was regenerated." : "",
    );
  }

  function ensureTagUidForNode(tagNode) {
    var uid = tagNode.tagUid;
    var originalUid = uid;

    while (
      !uid ||
      uidExistsInNodes("orangescada-tag", uid, tagNode.id)
    ) {
      uid = osUid("tag");
    }
    tagNode.tagUid = uid;
    return uid !== originalUid;
  }

  function ensureTagUid(currentId) {
    var input = $("#node-input-tagUid");
    var tagNode = {
      id: currentId,
      tagUid: input.val(),
      device: $("#node-input-device").val(),
    };
    var changed = ensureTagUidForNode(tagNode);
    input.val(tagNode.tagUid);
    showUidWarning("#node-input-uid-warning", changed ? "Duplicate or missing UID was regenerated." : "");
  }

  RED.nodes.registerType("orangescada-driver-config", {
    category: "config",
    defaults: {
      name: { value: "" },
      host: { value: "localhost", required: true },
      port: { value: 8892, required: true, validate: RED.validators.number() },
      ssl: { value: false },
      uid: { value: "nodered", required: true },
      reconnectMs: { value: 5000, validate: RED.validators.number() },
    },
    credentials: {
      password: { type: "password" },
    },
    label: function () {
      return this.name || this.uid || "OrangeScada Driver";
    },
  });

  RED.nodes.registerType("orangescada-node-config", {
    category: "config",
    defaults: {
      name: { value: "", required: true },
      uid: { value: "" },
      driver: { type: "orangescada-driver-config", required: true },
    },
    label: function () {
      return this.name || "OrangeScada Node";
    },
    onadd: function () {
      if (
        ensureConfigUidForNode(
          this,
          "node",
          "orangescada-node-config",
          function (config, current) {
            return config.driver === current.driver;
          },
        )
      ) {
        this.changed = true;
      }
    },
    oneditprepare: function () {
      ensureConfigUid(
        "#node-config-input-uid",
        "node",
        "orangescada-node-config",
        this.id,
        function (config, current) {
          return config.driver === (current.driver || $("#node-config-input-driver").val());
        },
        "#node-config-input-uid-warning",
      );
    },
    oneditsave: function () {
      ensureConfigUid(
        "#node-config-input-uid",
        "node",
        "orangescada-node-config",
        this.id,
        function (config, current) {
          return config.driver === (current.driver || $("#node-config-input-driver").val());
        },
        "#node-config-input-uid-warning",
      );
    },
  });

  RED.nodes.registerType("orangescada-device-config", {
    category: "config",
    defaults: {
      name: { value: "", required: true },
      uid: { value: "" },
      node: { type: "orangescada-node-config", required: true },
    },
    label: function () {
      return this.name || "OrangeScada Device";
    },
    onadd: function () {
      if (
        ensureConfigUidForNode(
          this,
          "device",
          "orangescada-device-config",
          function (config, current) {
            var selectedNode = RED.nodes.node(current.node);
            var configNode = RED.nodes.node(config.node);
            return selectedNode && configNode && selectedNode.driver === configNode.driver;
          },
        )
      ) {
        this.changed = true;
      }
    },
    oneditprepare: function () {
      ensureConfigUid(
        "#node-config-input-uid",
        "device",
        "orangescada-device-config",
        this.id,
        function (config) {
          var selectedNodeId = $("#node-config-input-node").val();
          var selectedNode = RED.nodes.node(selectedNodeId);
          var configNode = RED.nodes.node(config.node);
          return selectedNode && configNode && selectedNode.driver === configNode.driver;
        },
        "#node-config-input-uid-warning",
      );
    },
    oneditsave: function () {
      ensureConfigUid(
        "#node-config-input-uid",
        "device",
        "orangescada-device-config",
        this.id,
        function (config) {
          var selectedNodeId = $("#node-config-input-node").val();
          var selectedNode = RED.nodes.node(selectedNodeId);
          var configNode = RED.nodes.node(config.node);
          return selectedNode && configNode && selectedNode.driver === configNode.driver;
        },
        "#node-config-input-uid-warning",
      );
    },
  });

  RED.nodes.registerType("orangescada-tag", {
    category: "OrangeScada",
    color: "#d8e8ff",
    defaults: {
      name: { value: "" },
      driver: { type: "orangescada-driver-config", required: true },
      node: { type: "orangescada-node-config", required: true },
      device: { type: "orangescada-device-config", required: true },
      tagUid: { value: "" },
      tagName: { value: "", required: true },
      tagType: { value: "float", required: true },
      address: { value: 0, validate: RED.validators.number() },
    },
    inputs: 1,
    outputs: 1,
    icon: "bridge.svg",
    label: function () {
      return this.name || this.tagName || "OrangeScadaTag";
    },
    onadd: function () {
      if (ensureTagUidForNode(this)) {
        this.changed = true;
      }
    },
    oneditprepare: function () {
      function refreshNodes() {
        var driverId = $("#node-input-driver").val();
        filterConfigSelect("#node-input-node", function (config) {
          return config.driver === driverId;
        });
        refreshDevices();
      }

      function refreshDevices() {
        var nodeId = $("#node-input-node").val();
        filterConfigSelect("#node-input-device", function (config) {
          return config.node === nodeId;
        });
      }

      $("#node-input-driver").on("change", refreshNodes);
      $("#node-input-node").on("change", refreshDevices);
      $("#node-input-device").on("change", function () {
        ensureTagUid(this.id);
      }.bind(this));

      setTimeout(function () {
        refreshNodes();
        refreshDevices();
        ensureTagUid(this.id);
      }.bind(this), 0);
    },
    oneditsave: function () {
      ensureTagUid(this.id);
    },
  });
</script>

<script type="text/html" data-template-name="orangescada-driver-config">

      type="checkbox"

  <div class="form-row">
    <label for="node-config-input-uid"><i class="fa fa-id-card"></i> UID</label>

</script>
